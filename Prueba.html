<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Solicitud Carta de NO Reclamación</title>
</head>
<body>

<div id="solicitud-carta-no-reclamacion" style="padding: 20px; border: 1px solid #ccc; font-family: Arial, sans-serif; border-radius: 8px; max-width: 500px; margin: auto;">
    <h2 style="margin-bottom: 15px;">Solicitud Carta de NO Reclamación</h2>

    <div style="background: #f0f7ff; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid #2d6df6;">
        <p style="margin: 0; font-size: 14px;"><strong>Funcionario de turno:</strong> <span id="nombre-funcionario">Cargando...</span></p>
        <p style="margin: 5px 0 0 0; font-size: 14px;"><strong>Correo de solicitud:</strong> <span id="correo-funcionario">Cargando...</span></p>
    </div>

    <div style="display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px;">
        <div style="display: flex; align-items: center; font-size: 14px;">
            <strong style="width: 100px;">Para:</strong> 
            <input type="text" id="email_para_cnr" placeholder="ejemplo@sura.com.co" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
        </div>
    </div>

    <button onclick="enviarEmail()" style="width: 100%; background-color: #2d6df6; color: white; padding: 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">
        Enviar email
    </button>
</div>

<script>
    // --- CONFIGURACIÓN AUTOMÁTICA ---
    const SHEET_ID = '13acbMD8c-OO8aMIz6Tiuf2kJAxwcxO6J5ymKp6LYHnY';
    const HOJA = "Antioquia";
    const CELDA_NOMBRE = "Q6";
    const CELDA_CORREO = "Q8";

    let datosContacto = { nombre: "Cargando...", correo: "Cargando..." };

    async function cargarDatos() {
        try {
            // Usamos la API GVIZ para evitar errores de CORS
            const urlNombre = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tq=SELECT%20A&range=${CELDA_NOMBRE}&sheet=${HOJA}`;
            const urlCorreo = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tq=SELECT%20A&range=${CELDA_CORREO}&sheet=${HOJA}`;

            const [resNombre, resCorreo] = await Promise.all([fetch(urlNombre), fetch(urlCorreo)]);
            
            const textNombre = await resNombre.text();
            const textCorreo = await resCorreo.text();
            
            // Limpieza del JSON de Google
            const jsonNombre = JSON.parse(textNombre.substring(47, textNombre.length - 2));
            const jsonCorreo = JSON.parse(textCorreo.substring(47, textCorreo.length - 2));

            datosContacto.nombre = jsonNombre.table.rows[0].c[0].v;
            datosContacto.correo = jsonCorreo.table.rows[0].c[0].v;

            document.getElementById('nombre-funcionario').innerText = datosContacto.nombre;
            document.getElementById('correo-funcionario').innerText = datosContacto.correo;
        } catch (e) {
            console.error(e);
            document.getElementById('nombre-funcionario').innerText = "Error al cargar";
        }
    }

    function enviarEmail() {
        const para = document.getElementById('email_para_cnr').value.trim();
        const cuerpo = `Cordial saludo,\n\nEnvío la información para solicitud de carta de no reclamación.\n\nFuncionario de turno: ${datosContacto.nombre}\nCorreo de contacto: ${datosContacto.correo}\n\nNombre asegurado:\nCédula:\nPlaca:\n\nMuchas gracias.`;
        const url = `https://outlook.cloud.microsoft/mail/deeplink/compose?to=${encodeURIComponent(para)}&subject=${encodeURIComponent("Solicitud - Carta de No Reclamación")}&body=${encodeURIComponent(cuerpo)}`;
        window.open(url, "_blank");
    }

    cargarDatos();
</script>

</body>
</html>
