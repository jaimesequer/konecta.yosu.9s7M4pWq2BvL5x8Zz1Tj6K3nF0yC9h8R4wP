<div id="solicitud-carta-no-reclamacion" style="padding: 20px; border: 1px solid #ccc; font-family: Arial, sans-serif; border-radius: 8px;">
    <h2 style="margin-bottom: 15px;">Solicitud Carta de NO Reclamación</h2>

    <div style="background: #f0f7ff; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid #2d6df6;">
        <p style="margin: 0; font-size: 14px;"><strong>Funcionario de turno:</strong> <span id="nombre-funcionario">Cargando...</span></p>
        <p style="margin: 5px 0 0 0; font-size: 14px;"><strong>Correo de solicitud:</strong> <span id="correo-funcionario">Cargando...</span></p>
    </div>

    <div style="display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px;">
        <div style="display: flex; align-items: center; font-size: 14px;">
            <strong style="width: 100px;">Para:</strong> 
            <input type="text" id="email_para_cnr" placeholder="ejemplo@sura.com.co" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
        </div>
    </div>

    <button onclick="enviarEmail()" style="width: 100%; background-color: #2d6df6; color: white; padding: 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">
        Enviar email
    </button>
</div>

<script>
    // --- CONFIGURACIÓN ---
    const CONFIG = {
        hoja: "Antioquia",
        nombre: "Q6",
        correo: "Q8"
    };

    const URL_BASE = `https://script.google.com/macros/s/AKfycbwD0UpUNIjivijsxw98aYcT_8SrETfKU_oktDxirweY3bZg0Zc0-MDRAEAv80reW1lleQ/exec?hoja=${CONFIG.hoja}&nombre=${CONFIG.nombre}&correo=${CONFIG.correo}`;
    let datosContacto = { nombre: "", correo: "" };

    // --- CARGA DE DATOS ---
    fetch(URL_BASE)
        .then(res => res.json())
        .then(data => {
            datosContacto = data;
            document.getElementById('nombre-funcionario').innerText = data.nombre;
            document.getElementById('correo-funcionario').innerText = data.correo;
        })
        .catch(err => {
            document.getElementById('nombre-funcionario').innerText = "Error de conexión";
            console.error(err);
        });

    function enviarEmail() {
        const para = document.getElementById('email_para_cnr').value.trim();
        const cuerpo = `Cordial saludo,\n\nFuncionario: ${datosContacto.nombre}\nCorreo: ${datosContacto.correo}\n\n[Resto del cuerpo...]`;
        const url = `https://outlook.cloud.microsoft/mail/deeplink/compose?to=${encodeURIComponent(para)}&subject=Solicitud&body=${encodeURIComponent(cuerpo)}`;
        window.open(url, "_blank");
    }
</script>
