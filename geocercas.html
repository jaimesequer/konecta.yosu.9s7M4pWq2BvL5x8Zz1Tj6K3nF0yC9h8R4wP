<h1 style="text-align: center; font-family: Arial, sans-serif; color: #2d6df6; margin-top: 15px; margin-bottom: 0.1px;">
    Geocercas - Movilidad Flexible
</h1>

<div id="bloqueMapaGeocerca" style="font-family: Arial, sans-serif; width: 100%; margin: 10px 0; box-sizing: border-box; max-width: 800px; margin: 0 auto; padding: 10px;">
    
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; margin-bottom: 15px;">
        <div>
            <label style="font-size: 14px; font-weight: bold; display: block; margin-bottom: 5px; color: #2e7d32;">📍 Origen (Pin Verde):</label>

            <div style="display: flex; gap: 5px;">
                <input type="text" id="txt_origen" placeholder="Ej: Calle 26 # 45-95 Medellín ó Coordenadas" style="flex: 1; padding: 10px; border: 1px solid #ced4da; border-radius: 4px; font-size: 13px; box-sizing: border-box;">
                <button type="button" onclick="buscarDireccion('origen')" style="background-color: #2e7d32; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold;">🔍 Buscar</button>
            </div>
        </div>
        <div>
            <label style="font-size: 14px; font-weight: bold; display: block; margin-bottom: 5px; color: #0056b3;">🏁 Destino (Pin Azul):</label>
            <div style="display: flex; gap: 5px;">
                <input type="text" id="txt_destino" placeholder="Ej: Centro Comercial El Tesoro, Medellín ó Coordenadas" style="flex: 1; padding: 10px; border: 1px solid #ced4da; border-radius: 4px; font-size: 13px; box-sizing: border-box;">
                <button type="button" onclick="buscarDireccion('destino')" style="background-color: #0056b3; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold;">🔍 Buscar</button>
            </div>
        </div>
    </div>

    <div id="panel_distancia" style="display: none; background-color: #e3f2fd; border: 1px solid #90caf9; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 15px; color: #0d47a1; font-weight: bold; text-align: center;">
        🚗 Distancia estimada del trayecto: <span id="lbl_kilometros">0.0</span> Km
    </div>

    <div id="map" style="width: 100%; height: 350px; border-radius: 8px 8px 0 0; border: 1px solid #ccc; border-bottom: none; z-index: 1; box-sizing: border-box;"></div>

    <button type="button" onclick="verifyGeofence()" style="width: 100%; background-color: #1565c0; color: white; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 0 0 8px 8px; cursor: pointer; transition: background 0.3s; margin-bottom: 20px;">
        🎯 Verificar Cobertura de Geocerca
    </button>

    <div id="alerta_mapa_error" style="display: none; padding: 16px; border-radius: 4px; font-size: 16px; border: 2px solid #f5c6cb; background-color: #f8d7da; color: #721c24; font-weight: bold; line-height: 1.6; text-align: center;">
        No aplica, fuera de la geocerca ❌
    </div>

    <div id="alerta_servicio_local" style="display: none; padding: 16px; border-radius: 4px; font-size: 15px; border: 2px solid #c3e6cb; background-color: #d4edda; color: #155724; line-height: 1.6; text-align: center; font-weight: bold;">
        Aplica el servicio ✅
    </div>
</div>

    function initMap() {
        map = L.map('map', {
            fullscreenControl: true,
            fullscreenControlOptions: { position: 'topleft' }
        }).setView([4.570868, -74.297333], 6);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Renderizar geocercas en color azul cielo (evitando pintar capas si están vacías)
        for (let city in geofencesData) {
            if (geofencesData[city].length > 0) {
                let leafletCoords = geofencesData[city].map(coord => [coord[1], coord[0]]);
                polygons[city] = L.polygon(leafletCoords, {
                    color: '#0099e6',      
                    fillColor: '#00bfff',  
                    fillOpacity: 0.22,
                    weight: 2
                }).addTo(map);
            }
        }

        // Configuración de pines iniciales estilizados
        const greenIcon = new L.Icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
        });

        const blueIcon = new L.Icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
        });

        markerOrigen = L.marker([4.6580, -74.0930], {icon: greenIcon, draggable: true}).addTo(map).bindPopup("Origen 📍");
        markerDestino = L.marker([4.6710, -74.0820], {icon: blueIcon, draggable: true}).addTo(map).bindPopup("Destino 🏁");

        markerOrigen.on('dragend', limpiarRutaGrafica);
        markerDestino.on('dragend', limpiarRutaGrafica);
    }

    function limpiarRutaGrafica() {
        if (rutaLayer) { map.removeLayer(rutaLayer); rutaLayer = null; }
        document.getElementById("panel_distancia").style.display = "none";
    }

    // EL MOTOR DE BÚSQUEDA ROBUSTO GLOBAL
    async function obtenerCoordenadas(inputString) {
        const limpio = inputString.trim();
        if (!limpio) return null;

        if (limpio.includes('maps.google') || limpio.startsWith('http')) {
            const regexUrlCoords = /@(-?\d+\.\d+),(-?\d+\.\d+)/;
            const match = limpio.match(regexUrlCoords);
            if (match) {
                return [parseFloat(match[1]), parseFloat(match[2])];
            }
        }

        const regexCoords = /^[-+]?([1-8]?\d(\.\d+)?|90(\.0+)?),\s*[-+]?(180(\.0+)?|((1[0-7]\d)|([1-9]?\d))(\.\d+)?)$/;
        if (regexCoords.test(limpio)) {
            const [lat, lon] = limpio.split(',').map(Number);
            return [lat, lon];
        }

        try {
            const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=co&q=${encodeURIComponent(limpio)}`;
            const response = await fetch(url, { headers: { 'Accept-Language': 'es' } });
            const data = await response.json();
            if (data && data.length > 0) {
                return [parseFloat(data[0].lat), parseFloat(data[0].lon)];
            }
        } catch (error) {
            console.error("Error en geocodificación: ", error);
        }
        return null;
    }

    async function buscarDireccion(tipo) {
        let idInput = tipo === 'origen' ? 'txt_origen' : 'txt_destino';
        let marker = tipo === 'origen' ? markerOrigen : markerDestino;
        let entrada = document.getElementById(idInput).value;
        
        let coordenadas = await obtenerCoordenadas(entrada);
        if (coordenadas) {
            marker.setLatLng(coordenadas);
            map.setView(coordenadas, 14); 
            limpiarRutaGrafica();
        } else {
            alert("No se pudo procesar la ubicación. Intenta escribir la ciudad o añadir más detalles.");
        }
    }

    // BOTÓN MAESTRO: EVALUAR COBERTURAS MATEMÁTICAS EN LAS GEOCERCAS
    async function verifyGeofence() {
        let entradaOrigen = document.getElementById('txt_origen').value;
        let entradaDestino = document.getElementById('txt_destino').value;

        let coordsOrigen = await obtenerCoordenadas(entradaOrigen);
        let coordsDestino = await obtenerCoordenadas(entradaDestino);

        if (coordsOrigen) markerOrigen.setLatLng(coordsOrigen);
        if (coordsDestino) markerDestino.setLatLng(coordsDestino);

        let latLngOrig = markerOrigen.getLatLng();
        let latLngDest = markerDestino.getLatLng();

        let ptOrigen = turf.point([latLngOrig.lng, latLngOrig.lat]);
        let ptDestino = turf.point([latLngDest.lng, latLngDest.lat]);

        let aplica = false;

        // Comprobación geométrica matemática
        for (let city in geofencesData) {
            if (geofencesData[city].length > 0) {
                let coords = [...geofencesData[city]];
                if (coords[0][0] !== coords[coords.length-1][0] || coords[0][1] !== coords[coords.length-1][1]) {
                    coords.push(coords[0]);
                }
                let poly = turf.polygon([coords]);
                if (turf.booleanPointInPolygon(ptOrigen, poly) && turf.booleanPointInPolygon(ptDestino, poly)) {
                    aplica = true;
                    break;
                }
            }
        }

        let alertaError = document.getElementById("alerta_mapa_error");
        let alertaExito = document.getElementById("alerta_servicio_local");

        if (aplica) {
            alertaError.style.display = "none";
            alertaExito.style.display = "block";

            let grupo = new L.featureGroup([markerOrigen, markerDestino]);
            map.fitBounds(grupo.getBounds().pad(0.3));

            try {
                let urlRuta = `https://router.project-osrm.org/route/v1/driving/${latLngOrig.lng},${latLngOrig.lat};${latLngDest.lng},${latLngDest.lat}?overview=full&geometries=geojson`;
                let resRuta = await fetch(urlRuta);
                let dataRuta = await resRuta.json();

                if (dataRuta.routes && dataRuta.routes.length > 0) {
                    limpiarRutaGrafica();
                    let routeCoords = dataRuta.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
                    rutaLayer = L.polyline(routeCoords, {color: '#0056b3', weight: 5, opacity: 0.85}).addTo(map);

                    let kms = (dataRuta.routes[0].distance / 1000).toFixed(1);
                    document.getElementById("lbl_kilometros").innerText = kms;
                    document.getElementById("panel_distancia").style.display = "block";
                }
            } catch (err) {
                let distLineal = (map.distance(latLngOrig, latLngDest) / 1000).toFixed(1);
                document.getElementById("lbl_kilometros").innerText = distLineal;
                document.getElementById("panel_distancia").style.display = "block";
            }
        } else {
            limpiarRutaGrafica();
            alertaExito.style.display = "none";
            alertaError.style.display = "block"; // Muestra "No aplica, fuera de la geocerca ❌"
            
            let grupo = new L.featureGroup([markerOrigen, markerDestino]);
            map.fitBounds(grupo.getBounds().pad(0.3));
        }
    }

    window.onload = initMap;
