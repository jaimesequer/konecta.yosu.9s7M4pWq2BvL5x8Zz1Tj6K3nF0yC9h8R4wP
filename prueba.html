<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servicio de Asistencia Legal - Carta No Reclamación</title>
</head>
<body style="font-family: sans-serif; background-color: #fafafa; padding: 20px; color: #333;">

    <div style="max-width: 600px; margin: 0 auto; background: #ffffff; padding: 25px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
        
        <h2 style="color: #2d6df6; margin-top: 0; border-bottom: 2px solid #2d6df6; padding-bottom: 10px;">Solicitud de Carta de No Reclamación</h2>

        <div style="display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; margin-top: 15px;">
            <div style="display: flex; align-items: center; font-size: 14px;">
                <strong style="width: 180px; color: #333; flex-shrink: 0;">Para:</strong> 
                <input type="text" id="email_para_cnr" placeholder="Asegurado@ejemplo.com" style="width: 100%; max-width: 450px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px;">
            </div>
            <div style="display: flex; align-items: center; font-size: 14px;">
                <strong style="width: 180px; color: #333; flex-shrink: 0;">CC:</strong> 
                <span style="color: #777; font-size: 14px;">N/A</span>
            </div>
            <div style="display: flex; align-items: center; font-size: 14px;">
                <strong style="width: 180px; color: #333; flex-shrink: 0;">CCO:</strong> 
                <span style="color: #777; font-size: 14px;">N/A</span>
            </div>
        </div>

        <div id="contenedor_turno" style="background-color: #f4f7fe; border-left: 4px solid #2d6df6; padding: 12px 15px; margin-bottom: 15px; border-radius: 0 4px 4px 0; font-size: 14px;">
            <span style="color: #555; font-weight: bold;">Nombre y Correo de turno:</span> 
            <span id="info_turno_visual" style="color: #2d6df6; font-weight: bold;">Consultando a Google Sheets...</span>
        </div>

        <hr style="border: 0; border-top: 1px solid #ddd; margin: 20px 0;">
            
        <div style="text-align: center; margin-top: 25px;">
            <button onclick="enviarEmailCartaNoReclamacionVacia()" style="background-color: #2d6df6; color: #ffffff; font-weight: bold; font-size: 14px; padding: 12px 28px; border: none; border-radius: 4px; cursor: pointer; transition: background 0.3s;" onmouseover="this.style.backgroundColor='#1a52cc'" onmouseout="this.style.backgroundColor='#2d6df6'">
                Enviar email
            </button>
        </div>

    </div>

    <script>
    // Variables completamente vacías. Si no carga de Google, se quedan vacías.
    let responsableNombre = "";
    let responsableEmail = "";

    // Callback para la ruta alternativa (archivos locales / evasión de CORS)
    function miCallbackGlobal(datos) {
        if (datos && (datos.nombre || datos.correo)) {
            responsableNombre = datos.nombre ? datos.nombre.toString().trim() : "";
            responsableEmail = datos.correo ? datos.correo.toString().trim() : "";
            actualizarInterfaz(responsableNombre, responsableEmail);
        } else {
            mostrarErrorAlineacion();
        }
    }

    function actualizarInterfaz(nombre, correo) {
        const infoVisual = document.getElementById('info_turno_visual');
        if (nombre || correo) {
            infoVisual.innerText = `${nombre} / ${correo}`;
        } else {
            infoVisual.innerText = "Celda vacía en Sheets";
        }
    }

    function mostrarErrorAlineacion() {
        const contenedor = document.getElementById('contenedor_turno');
        const infoVisual = document.getElementById('info_turno_visual');
        
        contenedor.style.backgroundColor = "#fff5f5";
        contenedor.style.borderLeftColor = "#e53e3e";
        infoVisual.style.color = "#e53e3e";
        infoVisual.innerText = "Error: No se pudo conectar con Google Sheets";
    }

    async function cargarTurnoDesdeScript() {
        const urlBase = 'https://script.google.com/macros/s/AKfycbzSN-QUK3tNsK2QEQiL456542OYa1sDjeiQN9tCc1vUm7FesvVqwgmTzGsk4yXYqLr-8A/exec';
        const cacheBuster = `_=${new Date().getTime()}`;
        
        try {
            // Intento 1: Fetch directo estándar
            const response = await fetch(`${urlBase}?${cacheBuster}`);
            if (!response.ok) throw new Error("Error de red");
            
            const datos = await response.json();
            responsableNombre = datos.nombre ? datos.nombre.toString().trim() : "";
            responsableEmail = datos.correo ? datos.correo.toString().trim() : "";
            
            actualizarInterfaz(responsableNombre, responsableEmail);
            
        } catch (e) {
            // Intento 2: Ruta bypass por tag script (esencial para archivos locales 'file:///')
            const scriptAlternativo = document.createElement('script');
            scriptAlternativo.src = `${urlBase}?callback=miCallbackGlobal&${cacheBuster}`;
            
            const timeoutFailsafe = setTimeout(() => {
                if (document.getElementById('info_turno_visual').innerText === "Consultando a Google Sheets...") {
                    mostrarErrorAlineacion();
                }
            }, 5000); // 5 segundos de espera máxima antes de declarar error de conexión
            
            scriptAlternativo.onerror = () => {
                clearTimeout(timeoutFailsafe);
                mostrarErrorAlineacion();
            };
            
            scriptAlternativo.onload = () => clearTimeout(timeoutFailsafe);
            document.body.appendChild(scriptAlternativo);
        }
    }

    // Inicializar la carga apenas abra el documento
    cargarTurnoDesdeScript();

    function enviarEmailCartaNoReclamacionVacia() {
        const paraFinal = document.getElementById('email_para_cnr').value.trim();
        const asuntoTxt = `Solicitud - Carta de No Reclamación`;
        
        // Si las variables están vacías, no enviará datos fantasma
        const responsableFinal = (responsableNombre || responsableEmail) 
            ? `${responsableNombre} / ${responsableEmail}` 
            : "(No se cargó responsable de turno)";
        
        const cuerpoTxt = `Cordial saludo;\n\n`
            + `Envío la información requerida para dar trámite a tu solicitud de carta de no reclamación.\n\n`
            + `Correo al cual debes realizar la solicitud: ${responsableFinal}\n`
            + `Nombre asegurado:\n`
            + `Cédula asegurada:\n`
            + `Nombre conductor:\n`
            + `Cédula conductora:\n`
            + `Placa del vehículo asegurado:\n`
            + `Versión de los hechos. (accidente):\n`
            + `Fecha de los hechos:\n`
            + `Hora de los hechos:\n`
            + `Dirección del accidente:\n`
            + `Ciudad del accidente.\n`
            + `Placa vehículo tercero:\n`
            + `Certificado dirigido a: (Seguros xxx)\n`
            + `Correo:\n`
            + `Teléfono:\n\n`
            + `Tiempo de respuesta a la solicitud, 3 días hábiles.\n\n`
            + `Muchas gracias.`;

        const urlOutlook = `https://outlook.cloud.microsoft/mail/deeplink/compose` 
            + `?to=${encodeURIComponent(paraFinal)}` 
            + `&subject=${encodeURIComponent(asuntoTxt)}` 
            + `&body=${encodeURIComponent(cuerpoTxt)}`;

        window.open(urlOutlook, "_blank");
    }
    </script>
</body>
</html>
