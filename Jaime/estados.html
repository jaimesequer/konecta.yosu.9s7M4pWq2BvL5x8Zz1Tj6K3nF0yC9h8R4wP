<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estados de Sugerencias</title>

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 40px;
      background-color: #f4f6f8;
      color: #333;
    }

    /* TÍTULO CENTRADO Y MÁS GRANDE */
    h1 { 
      color: #1a252f; 
      margin-bottom: 5px; 
      text-align: center;
      font-size: 2.5em;
    }

    .info { 
      color: #666; 
      font-size: 1em; 
      margin-bottom: 25px; 
      text-align: center;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #ffffff;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      border-radius: 8px;
      overflow: hidden;
    }

    th, td {
      padding: 14px 16px;
      text-align: left;
      border-bottom: 1px solid #eef2f5;
      vertical-align: middle;
    }

    th {
      background-color: #0d6efd;
      color: #ffffff;
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.85em;
      letter-spacing: 0.5px;
    }

    tr:hover { background-color: #f8f9fa; }

    /* COLUMNA C MÁS ANCHA */
    th:nth-child(3), td:nth-child(3) {
      min-width: 160px;
    }

    /* ESTILOS DE ESTADOS */
    .badge-status {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 12px;
      font-weight: bold;
      font-size: 0.85em;
      text-align: center;
      width: 100%;
      box-sizing: border-box;
    }

    .estado-leido {
      background-color: #ffecb3;
      color: #856404;
    }

    .estado-en-ejecucion {
      background-color: #ffe0b2;
      color: #e65100;
    }

    .estado-finalizado {
      background-color: #c8e6c9;
      color: #1b5e20;
    }

    .estado-descartado {
      background-color: #ffcdd2;
      color: #b71c1c;
    }

    /* COLUMNA G (TEXTO RECORTADO / LEER MÁS) */
    .texto-recortado {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 250px;
      display: block;
    }

    .texto-completo {
      white-space: normal;
      word-break: break-word;
      display: block;
    }

    .btn-leer-mas {
      color: #0d6efd;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.8em;
      margin-top: 4px;
      display: inline-block;
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <h1>Estados de Sugerencias</h1>
  <p class="info">Listado de sugerencias en seguimiento.</p>

  <table id="tabla-sugerencias">
    <thead>
      <tr id="encabezados"></tr>
    </thead>
    <tbody id="cuerpo-tabla"></tbody>
  </table>

  <script>
    const ID_DOC = '13acbMD8c-OO8aMIz6Tiuf2kJAxwcxO6J5ymKp6LYHnY';
    const GID_HOJA = '165722301';
    
    const URL_GVIZ = `https://docs.google.com/spreadsheets/d/${ID_DOC}/gviz/tq?tq=SELECT%20A,B,C,D,E,F,G,H&gid=${GID_HOJA}`;

    // Variable global para mantener abierta SOLO una sugerencia a la vez
    let sugerenciaAbiertaId = null;

    function formatearFechaGoogle(valor) {
      if (!valor) return '';
      // Si viene con el formato Date(YYYY,M,D)
      if (typeof valor === 'string' && valor.startsWith('Date(')) {
        const partes = valor.replace('Date(', '').replace(')', '').split(',');
        if (partes.length >= 3) {
          const anio = partes[0].trim();
          const mes = String(parseInt(partes[1].trim()) + 1).padStart(2, '0'); // Los meses en JS empiezan en 0
          const dia = String(partes[2].trim()).padStart(2, '0');
          return `${dia}/${mes}/${anio}`;
        }
      }
      return valor;
    }

    function cargarSugerencias() {
      fetch(URL_GVIZ)
        .then(res => res.text())
        .then(rep => {
          const jsonText = rep.substring(rep.indexOf('{'), rep.lastIndexOf('}') + 1);
          const data = JSON.parse(jsonText);
          
          renderizarTablaGViz(data.table);
        })
        .catch(err => console.error(err));
    }

    function renderizarTablaGViz(tablaData) {
      const filaEncabezados = document.getElementById('encabezados');
      const cuerpoTabla = document.getElementById('cuerpo-tabla');

      // 1. Renderizar Encabezados
      if (filaEncabezados.children.length === 0) {
        tablaData.cols.forEach(col => {
          const th = document.createElement('th');
          th.textContent = col.label || col.id;
          filaEncabezados.appendChild(th);
        });
      }

      // 2. Invertir las filas para que lo último agregado aparezca de primero
      const filasInvertidas = [...tablaData.rows].reverse();

      // 3. Renderizar Filas
      cuerpoTabla.innerHTML = '';
      filasInvertidas.forEach((row, indexFila) => {
        const tr = document.createElement('tr');
        
        // Identificador único para cada fila
        const idFila = row.c[0] ? String(row.c[0].v) : `fila-${indexFila}`;

        row.c.forEach((cell, indexColumna) => {
          const td = document.createElement('td');
          let valor = cell ? (cell.v !== null ? (cell.f || String(cell.v)) : '') : '';

          // COLUMNA B (Índice 1): FORMATO DE FECHA
          if (indexColumna === 1) {
            td.textContent = formatearFechaGoogle(cell ? cell.v : '');

          // COLUMNA C (Índice 2): ESTADOS
          } else if (indexColumna === 2) {
            const spanStatus = document.createElement('span');
            spanStatus.classList.add('badge-status');
            
            const valorLimpio = valor.trim().toLowerCase();

            if (valorLimpio === 'leído' || valorLimpio === 'leido') {
              spanStatus.classList.add('estado-leido');
            } else if (valorLimpio === 'en ejecución' || valorLimpio === 'en ejecucion') {
              spanStatus.classList.add('estado-en-ejecucion');
            } else if (valorLimpio === 'finalizado') {
              spanStatus.classList.add('estado-finalizado');
            } else if (valorLimpio === 'descartado') {
              spanStatus.classList.add('estado-descartado');
            }

            spanStatus.textContent = valor || '-';
            td.appendChild(spanStatus);

          // COLUMNA G (Índice 6): "LEER MÁS" ACCESIBLE Y PERSISTENTE
          } else if (indexColumna === 6) {
            const contenedorTexto = document.createElement('div');
            
            if (valor.length > 45) {
              const estaAbierto = (sugerenciaAbiertaId === idFila);

              contenedorTexto.classList.add(estaAbierto ? 'texto-completo' : 'texto-recortado');
              contenedorTexto.textContent = valor;

              const btnLeerMas = document.createElement('span');
              btnLeerMas.classList.add('btn-leer-mas');
              btnLeerMas.textContent = estaAbierto ? 'Leer menos' : 'Leer más';

              btnLeerMas.onclick = function() {
                if (sugerenciaAbiertaId === idFila) {
                  // Si le vuelve a dar click a la misma abierta, se cierra
                  sugerenciaAbiertaId = null;
                } else {
                  // Si abre una nueva, reemplaza la abierta anterior
                  sugerenciaAbiertaId = idFila;
                }
                renderizarTablaGViz(tablaData); // Re-renderizar para actualizar estados
              };

              td.appendChild(contenedorTexto);
              td.appendChild(btnLeerMas);
            } else {
              td.textContent = valor;
            }

          // RESTO DE COLUMNAS
          } else {
            td.textContent = valor;
          }

          tr.appendChild(td);
        });

        cuerpoTabla.appendChild(tr);
      });
    }

    cargarSugerencias();
    setInterval(cargarSugerencias, 5000);
  </script>
</body>
</html>
