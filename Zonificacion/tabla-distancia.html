<div style="text-align: center; margin: 20px 0;">
    <button type="button" id="btn_cargar_distancias" onclick="iniciarBuscador()" 
            style="background-color: #0033a0; color: white; border: none; padding: 12px 24px; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; transition: background 0.3s;">
        🔍 Consultar Tabla de Distancia
    </button>
</div>

<div id="ui_calculadora_distancias" style="display: none; max-width: 600px; margin: 20px auto; border-top: 2px dashed #ccc; padding-top: 15px;">
    <div style="display: grid; grid-template-columns: 1fr; gap: 15px; margin-bottom: 15px;">
        <div>
            <label style="font-size: 13px; font-weight: bold; color: #444;">Municipio Origen:</label>
            <select id="select_origen_standalone" onchange="actualizarDestinos()" style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #ccc;"></select>
        </div>
        <div>
            <label style="font-size: 13px; font-weight: bold; color: #444;">Municipio Destino:</label>
            <select id="select_destino_standalone" onchange="calcularResultados()" style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #ccc;" disabled></select>
        </div>
    </div>
    <div id="contenedor_resultados_dinamico"></div>
</div>

<script>
// Tu base de datos organizada
const DATA = [
    { origen: "MEDELLIN (ANTIOQUIA)", destino: "ABEJORRAL (ANTIOQUIA)", km: 86, zr: 0, zd: 0, conv: 0, notas: "0" },
    { origen: "CUCUTA (NORTE DE SANTANDER)", destino: "ABREGO (NORTE DE SANTANDER)", km: 168, zr: 140, zd: 0, conv: 80, notas: "0" },
    { origen: "BOGOTA (CUNDINAMARCA)", destino: "AGUACHICA  (CESAR)", km: 525, zr: 0, zd: 0, conv: 0, notas: "0" },
    { origen: "BUCARAMANGA (SANTANDER)", destino: "AGUACHICA (CESAR)", km: 186, zr: 0, zd: 0, conv: 90, notas: "0" },
    { origen: "CUCUTA (NORTE DE SANTANDER)", destino: "AGUACHICA (CESAR)", km: 257, zr: 250, zd: 0, conv: 0, notas: "0" }
];

let DB = {};

function iniciarSistema() {
    // 1. Organizar la base de datos en memoria
    DATA.forEach(item => {
        if(!DB[item.origen]) DB[item.origen] = {};
        if(!DB[item.origen][item.destino]) DB[item.origen][item.destino] = [];
        DB[item.origen][item.destino].push(item);
    });

    // 2. Poblar selector Origen
    const selO = document.getElementById('select_origen_standalone');
    selO.innerHTML = '<option value="">Seleccione origen...</option>';
    Object.keys(DB).sort().forEach(o => selO.innerHTML += `<option value="${o}">${o}</option>`);
    
    document.getElementById('ui_calculadora_distancias').style.display = "block";
    document.getElementById('btn_cargar_distancias').innerText = "✅ Filtro Activado";
}

function actualizarDestinos() {
    const o = document.getElementById('select_origen_standalone').value;
    const selD = document.getElementById('select_destino_standalone');
    selD.innerHTML = '<option value="">Seleccione destino...</option>';
    Object.keys(DB[o]).sort().forEach(d => selD.innerHTML += `<option value="${d}">${d}</option>`);
    selD.disabled = false;
}

function mostrarResultados() {
    const o = document.getElementById('select_origen_standalone').value;
    const d = document.getElementById('select_destino_standalone').value;
    const cont = document.getElementById('contenedor_resultados_dinamico');
    cont.innerHTML = "";
    
    // Aquí es donde consultamos la base (DB) y mostramos CADA coincidencia
    DB[o][d].forEach((r, i) => {
        cont.innerHTML += `
        <div style="border: 1px solid #0033a0; border-radius: 6px; margin-bottom: 10px; padding: 10px; background: white;">
            <div style="font-weight:bold; color:#0033a0; font-size:12px; margin-bottom:5px;">Opción ${i + 1}</div>
            <div style="display: grid; grid-template-columns: repeat(4, 1fr); text-align: center; font-size: 13px;">
                <div><small>KM</small><br><strong>${r.km}</strong></div>
                <div><small>ZR</small><br><strong>${r.zr}</strong></div>
                <div><small>ZD</small><br><strong>${r.zd}</strong></div>
                <div><small>CONV</small><br><strong>${r.conv}</strong></div>
            </div>
            ${r.notas !== "0" ? `<div style="margin-top:8px; padding:5px; font-size:11px; background:#fff3cd;"><strong>Nota:</strong> ${r.notas}</div>` : ''}
        </div>`;
    });
}
</script>
