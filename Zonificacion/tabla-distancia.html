            🔍 Consultar Tabla de Distancia
        </button>
    </div>
    <div id="ui_calculadora_distancias" style="display: none; margin-top: 20px; border-top: 2px dashed #ccc; padding-top: 15px;">

            <div>
                <label style="display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #444;">Municipio Origen:</label>
                <select id="select_origen_standalone" onchange="actualizarDestinos()" style="width: 100%; padding: 8px 10px; border-radius: 6px; border: 1px solid #ccc; font-size: 13px;"></select>
            </div>
            <div>
                <label style="display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #444;">Municipio Destino:</label>
                <select id="select_destino_standalone" onchange="mostrarResultados()" style="width: 100%; padding: 8px 10px; border-radius: 6px; border: 1px solid #ccc; font-size: 13px;" disabled>
                    <option value="">Seleccione primero un origen...</option>

            </div>
        </div>

        <div id="contenedor_resultados_dinamico"></div>
    </div>
</div>

{ origen: "GARZON (HUILA )", destino: "ZULUAGA (HUILA )", km: 23, zr: 0, zd: 0, conv: 0, notas: "0" }

];
let DB = {};

function iniciarSistema() {
    DB = {};
    DATA.forEach(item => {
        if(!DB[item.origen]) DB[item.origen] = {};
        if(!DB[item.origen][item.destino]) DB[item.origen][item.destino] = [];
        DB[item.origen][item.destino].push(item);
    });
    const selO = document.getElementById('select_origen_standalone');
    selO.innerHTML = '<option value="">Seleccione origen...</option>';
    Object.keys(DB).sort().forEach(o => selO.innerHTML += `<option value="${o}">${o}</option>`);

    document.getElementById('ui_calculadora_distancias').style.display = "block";
    document.getElementById('btn_cargar_distancias').innerText = "✅ Filtro Activado";
    document.getElementById('btn_cargar_distancias').style.backgroundColor = "#28a745";
}

function actualizarDestinos() {
    const o = document.getElementById('select_origen_standalone').value;
    const selD = document.getElementById('select_destino_standalone');
    selD.innerHTML = '<option value="">Seleccione destino...</option>';
    if (!o) { selD.disabled = true; return; }
    Object.keys(DB[o]).sort().forEach(d => selD.innerHTML += `<option value="${d}">${d}</option>`);
    selD.disabled = false;
    document.getElementById('contenedor_resultados_dinamico').innerHTML = "";
}

function mostrarResultados() {
    const o = document.getElementById('select_origen_standalone').value;
    const d = document.getElementById('select_destino_standalone').value;
    const cont = document.getElementById('contenedor_resultados_dinamico');
    cont.innerHTML = "";
    if (!o || !d) return;

    DB[o][d].forEach((r, i) => {
        cont.innerHTML += `
        <div style="background: #ffffff; border: 1px solid #0033a0; border-radius: 6px; margin-bottom: 15px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
            <div style="background-color: #0033a0; color: white; padding: 5px 12px; font-size: 12px; font-weight: bold;">Opción ${i + 1}</div>
            <div style="padding: 15px; font-size: 14px;">
                <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; text-align: center; margin-bottom: 10px;">
                    <div style="background: #f1f5f9; padding: 5px; border-radius: 4px;"><small style="display:block; font-size:9px;">KM</small><strong>${r.km}</strong></div>
                    <div style="background: #f1f5f9; padding: 5px; border-radius: 4px;"><small style="display:block; font-size:9px;">ZR</small><strong>${r.zr}</strong></div>
                    <div style="background: #f1f5f9; padding: 5px; border-radius: 4px;"><small style="display:block; font-size:9px;">ZD</small><strong>${r.zd}</strong></div>
                    <div style="background: #f1f5f9; padding: 5px; border-radius: 4px;"><small style="display:block; font-size:9px;">CONV</small><strong>${r.conv}</strong></div>
                </div>
                ${r.notas !== "0" && r.notas !== "NO APLICA" ? `<div style="background-color: #fff3cd; padding: 8px; font-size: 11px; color: #664d03; border-radius: 4px;"><strong>Nota:</strong> ${r.notas}</div>` : ''}
            </div>
        </div>`;
    });
}
</script>
