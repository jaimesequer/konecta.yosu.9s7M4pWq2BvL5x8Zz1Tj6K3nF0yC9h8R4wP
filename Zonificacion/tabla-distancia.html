<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de Distancias</title>
</head>
<body>

<div class="consulta-distancia-container" style="font-family: sans-serif; max-width: 600px; margin: 20px auto; padding: 15px; border: 1px solid #ddd; border-radius: 8px; background-color: #f9f9f9; box-sizing: border-box;">
    
    <div style="text-align: center;">
        <button type="button" id="btn_cargar_distancias" onclick="cargarTablaDistancias_standalone();" 
                style="background-color: #0033a0; color: white; border: none; padding: 12px 24px; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; max-width: 300px;">
            🔍 Consultar Tabla de Distancia
        </button>
    </div>

    <div id="status_consulta_dist" style="display: none; text-align: center; margin-top: 15px; font-size: 14px; color: #666; font-weight: bold;">
        🔄 Sincronizando datos de ruta remotos...
    </div>

    <div id="ui_calculadora_distancias" style="display: none; margin-top: 20px; border-top: 2px dashed #ccc; padding-top: 15px;">
        <div style="display: grid; grid-template-columns: 1fr; gap: 15px; margin-bottom: 15px;">
            <div>
                <label style="display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #444;">Municipio Origen:</label>
                <select id="select_origen_standalone" onchange="actualizarDestinosDisponibles()" style="width: 100%; padding: 8px 10px; border-radius: 6px; border: 1px solid #ccc; font-size: 13px;"></select>
            </div>
            <div>
                <label style="display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #444;">Municipio Destino:</label>
                <select id="select_destino_standalone" onchange="calcularDistanciaStandalone()" style="width: 100%; padding: 8px 10px; border-radius: 6px; border: 1px solid #ccc; font-size: 13px;" disabled>
                    <option value="" selected disabled>Primero seleccione un origen...</option>
                </select>
            </div>
        </div>

        <div id="contenedor_resultados_dinamico"></div>
    </div>
</div>

<script>
const URL_TABLA_ORIGEN = 'https://jaimesequer.github.io/konecta.yosu.9s7M4pWq2BvL5x8Zz1Tj6K3nF0yC9h8R4wP/Zonificacion/tabla-distancia.html';
let BASE_DATOS_DISTANCIAS = {};

async function cargarTablaDistancias_standalone() {
    const btn = document.getElementById('btn_cargar_distancias');
    const status = document.getElementById('status_consulta_dist');
    const uiCalc = document.getElementById('ui_calculadora_distancias');

    status.style.display = "block";
    btn.disabled = true;

    try {
        const response = await fetch(URL_TABLA_ORIGEN);
        const htmlText = await response.text();
        const doc = new DOMParser().parseFromString(htmlText, 'text/html');
        const filas = doc.querySelectorAll('#tabla_maestra_distancias tbody tr');

        BASE_DATOS_DISTANCIAS = {};

        filas.forEach(fila => {
            const origen = fila.getAttribute('data-origen')?.trim().toUpperCase();
            const destino = fila.getAttribute('data-destino')?.trim().toUpperCase();
            const celdas = fila.querySelectorAll('td');

            if (origen && destino && celdas.length >= 7) {
                if (!BASE_DATOS_DISTANCIAS[origen]) BASE_DATOS_DISTANCIAS[origen] = {};
                if (!BASE_DATOS_DISTANCIAS[origen][destino]) BASE_DATOS_DISTANCIAS[origen][destino] = [];

                BASE_DATOS_DISTANCIAS[origen][destino].push({
                    km: celdas[2].innerText.trim(),
                    zr: celdas[3].innerText.trim(),
                    zd: celdas[4].innerText.trim(),
                    conv: celdas[5].innerText.trim(),
                    notas: celdas[6].innerText.trim()
                });
            }
        });

        poblarOrigenesStandalone();
        status.style.display = "none";
        uiCalc.style.display = "block";
        btn.innerHTML = "✅ Filtro Activado";
    } catch (e) {
        status.innerText = "❌ Error: " + e.message;
    }
}

function poblarOrigenesStandalone() {
    const selOrigen = document.getElementById('select_origen_standalone');
    selOrigen.innerHTML = '<option value="" selected disabled>Seleccione origen...</option>';
    Object.keys(BASE_DATOS_DISTANCIAS).sort().forEach(o => {
        selOrigen.innerHTML += `<option value="${o}">${o}</option>`;
    });
}

function actualizarDestinosDisponibles() {
    const o = document.getElementById('select_origen_standalone').value;
    const selDestino = document.getElementById('select_destino_standalone');
    selDestino.innerHTML = '<option value="" selected disabled>Seleccione destino...</option>';
    Object.keys(BASE_DATOS_DISTANCIAS[o]).sort().forEach(d => {
        selDestino.innerHTML += `<option value="${d}">${d}</option>`;
    });
    selDestino.disabled = false;
}

function calcularDistanciaStandalone() {
    const o = document.getElementById('select_origen_standalone').value;
    const d = document.getElementById('select_destino_standalone').value;
    const contenedor = document.getElementById('contenedor_resultados_dinamico');
    
    contenedor.innerHTML = ""; 
    const listaRutas = BASE_DATOS_DISTANCIAS[o]?.[d];

    if (listaRutas) {
        listaRutas.forEach((ruta, index) => {
            contenedor.innerHTML += `
            <div style="background: #ffffff; border: 1px solid #0033a0; border-radius: 6px; margin-bottom: 15px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
                <div style="background-color: #0033a0; color: white; padding: 5px 12px; font-size: 12px; font-weight: bold;">Opción ${index + 1}</div>
                <div style="padding: 15px; font-size: 14px;">
                    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; text-align: center; margin-bottom: 10px;">
                        <div style="background: #f1f5f9; padding: 5px; border-radius: 4px;"><small style="display:block; font-size:9px;">KM</small><strong>${ruta.km}</strong></div>
                        <div style="background: #f1f5f9; padding: 5px; border-radius: 4px;"><small style="display:block; font-size:9px;">ZR</small><strong>${ruta.zr}</strong></div>
                        <div style="background: #f1f5f9; padding: 5px; border-radius: 4px;"><small style="display:block; font-size:9px;">ZD</small><strong>${ruta.zd}</strong></div>
                        <div style="background: #f1f5f9; padding: 5px; border-radius: 4px;"><small style="display:block; font-size:9px;">CONV</small><strong>${ruta.conv}</strong></div>
                    </div>
                    ${ruta.notas !== "0" && ruta.notas.toLowerCase() !== "no aplica" ? 
                      `<div style="background-color: #fff3cd; padding: 8px; font-size: 11px; color: #664d03; border-radius: 4px;"><strong>Nota:</strong> ${ruta.notas}</div>` : ''}
                </div>
            </div>`;
        });
    }
}
</script>
</body>
</html>
