let DB = {}; // indexado por nombre y por código (en minúscula) para búsqueda rápida

function construirDB() {
    DB = {};
    let opcionesHtml = [];
    DATA.forEach(item => {
        DB[item.nombre.trim().toLowerCase()] = item;
        DB[item.codigo.trim().toLowerCase()] = item;
        opcionesHtml.push(`<option data-recurso="${item.recurso}" data-codigo="${item.codigo}" data-carroceria="${item.carroceria}" value="${item.nombre}">`);
    });
    document.getElementById('lista-vehiculos').innerHTML = opcionesHtml.join('');
}
construirDB();

function buscarDatosVehiculo() {
    var inputElement = document.getElementById('vehiculo_input');
    var campoCodigo = document.getElementById('res_codigo');
    var campoRecurso = document.getElementById('res_recurso');
    var campoCarroceria = document.getElementById('res_carroceria');
    var textoBuscado = inputElement.value.trim().toLowerCase();

    if (textoBuscado === "") {
        campoCodigo.value = "";
        campoRecurso.value = "";
        campoCarroceria.value = "";
        return;
    }

    var item = DB[textoBuscado];
    if (item) {
        campoCodigo.value = item.codigo;
        campoRecurso.value = item.recurso;
        campoCarroceria.value = item.carroceria;
        if (item.codigo.trim().toLowerCase() === textoBuscado) {
            inputElement.value = item.nombre;
        }
    } else {
        campoCodigo.value = "";
        campoRecurso.value = "";
        campoCarroceria.value = "";
    }
}
