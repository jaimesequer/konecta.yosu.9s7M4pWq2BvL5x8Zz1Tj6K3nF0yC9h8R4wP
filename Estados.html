<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="icon" href="icono.png" type="image/png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estados de Sugerencias</title>

  <!-- Carga de Google Charts API -->
  <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 40px;
      background-color: #f4f6f8;
      color: #333;
    }

    h1 { 
      color: #1a252f; 
      margin-bottom: 20px; 
      text-align: center; /* Título centrado */
    }

    /* ESTILOS DEL GRÁFICO DE TORTA CENTRADO */
    #chart-container {
      width: 100%;
      max-width: 550px;
      height: 300px;
      margin: 0 auto 25px auto; /* Centrado horizontal */
      background: #ffffff;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      padding: 10px;
    }

    /* BUSCADOR CENTRADO */
    .search-container {
      margin-bottom: 20px;
      text-align: center;
    }

    .search-input {
      padding: 10px 16px;
      width: 100%;
      max-width: 350px;
      border: 1px solid #ced4da;
      border-radius: 20px;
      font-size: 0.9em;
      outline: none;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
      transition: all 0.3s ease;
    }

    .search-input:focus {
      border-color: #0d6efd;
      box-shadow: 0 2px 8px rgba(13, 110, 253, 0.25);
    }

    /* CONTENEDOR DE TABLA (Permite scroll libre en toda la página) */
    .table-container {
      background: #ffffff;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      border-radius: 8px;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
    }

    th, td {
      padding: 14px 16px;
      text-align: left;
      border-bottom: 1px solid #eef2f5;
      vertical-align: middle;
    }

    /* AJUSTE LEVE DE ANCHO PARA LA COLUMNA C (3ra columna) */
    td:nth-child(3), th:nth-child(3) {
      min-width: 140px;
    }

    /* ENCABEZADOS CENTRADOS Y FIJOS (STICKY AL NAVEGADOR) */
    th {
      background-color: #0d6efd;
      color: #ffffff;
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.85em;
      letter-spacing: 0.5px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 2px 2px rgba(0, 0, 0, 0.1);
    }

    tr:hover { background-color: #f8f9fa; }

    /* ESTILOS PARA LA COLUMNA C (ESTADOS) */
    .badge-status {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 12px;
      font-weight: bold;
      font-size: 0.85em;
      text-align: center;
    }

    .estado-leido {
      background-color: #ffecb3;
      color: #856404;
    }

    .estado-en-ejecucion {
      background-color: #ffe0b2;
      color: #e65100;
    }

    .estado-finalizado {
      background-color: #c8e6c9;
      color: #1b5e20;
    }

    .estado-descartado {
      background-color: #ffcdd2;
      color: #b71c1c;
    }

    /* ESTILOS PARA LA COLUMNA G (TEXTO RECORTADO Y CON SALTOS DE LÍNEA) */
    .texto-recortado {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 250px;
      display: block;
    }

    .texto-completo {
      white-space: pre-line;
      word-break: break-word;
      display: block;
    }

    .btn-leer-mas {
      color: #0d6efd;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.8em;
      margin-top: 4px;
      display: inline-block;
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <h1>Estados de Sugerencias</h1>

  <!-- Gráfico de Torta Centrado -->
  <div id="chart-container"></div>

  <!-- Cuadro de Búsqueda Centrado -->
  <div class="search-container">
    <input 
      type="text" 
      id="input-usuario" 
      class="search-input" 
      placeholder="Usuario de red" 
      onkeyup="filtrarPorUsuario()"
    >
  </div>

  <!-- Contenedor de Tabla -->
  <div class="table-container">
    <table id="tabla-sugerencias">
      <thead>
        <tr id="encabezados"></tr>
      </thead>
      <tbody id="cuerpo-tabla"></tbody>
    </table>
  </div>

  <script>
    const ID_DOC = '13acbMD8c-OO8aMIz6Tiuf2kJAxwcxO6J5ymKp6LYHnY';
    const GID_HOJA = '165722301';
    const URL_GVIZ = `https://docs.google.com/spreadsheets/d/${ID_DOC}/gviz/tq?tq=SELECT%20A,B,C,D,E,F,G,H&gid=${GID_HOJA}`;

    let datosGlobales = null;
    let filaExpandidaIndex = null; // Guarda el índice del elemento que el usuario decidió expandir

    google.charts.load('current', {'packages':['corechart']});

    function cargarSugerencias() {
      fetch(URL_GVIZ)
        .then(res => res.text())
        .then(rep => {
          const jsonText = rep.substring(rep.indexOf('{'), rep.lastIndexOf('}') + 1);
          datosGlobales = JSON.parse(jsonText).table;
          
          renderizarTablaGViz(datosGlobales);
          renderizarGraficoTorta(datosGlobales);
        })
        .catch(err => {
          console.error('Error al cargar datos:', err);
        });
    }

    // FORMATEAR FECHA DESDE Date(AAAA,M,D) O FORMATO DE TEXTO
    function formatearFecha(valor) {
      if (!valor) return '';
      if (typeof valor === 'string' && valor.startsWith('Date(')) {
        const partes = valor.replace('Date(', '').replace(')', '').split(',');
        if (partes.length >= 3) {
          const anio = partes[0].trim();
          const mes = String(parseInt(partes[1].trim()) + 1).padStart(2, '0'); // Los meses en JS empiezan en 0
          const dia = String(partes[2].trim()).padStart(2, '0');
          return `${dia}/${mes}/${anio}`;
        }
      }
      return valor;
    }

    function renderizarTablaGViz(tablaData) {
      const filaEncabezados = document.getElementById('encabezados');
      const cuerpoTabla = document.getElementById('cuerpo-tabla');
      const filtroUsuario = document.getElementById('input-usuario').value.trim().toLowerCase();

      // 1. Renderizar Encabezados
      if (filaEncabezados.children.length === 0) {
        tablaData.cols.forEach(col => {
          const th = document.createElement('th');
          th.textContent = col.label || col.id;
          filaEncabezados.appendChild(th);
        });
      }

      // 2. Renderizar Filas (Invertidas: de abajo hacia arriba)
      cuerpoTabla.innerHTML = '';
      const filasInvertidas = [...tablaData.rows].reverse();

      filasInvertidas.forEach((row, idxInvertido) => {
        // Mantenemos el índice original para no romper el "Leer más"
        const indexFila = tablaData.rows.length - 1 - idxInvertido;
        const usuarioCol = row.c[0] ? String(row.c[0].v || '').toLowerCase() : '';
        
        if (filtroUsuario && !usuarioCol.includes(filtroUsuario)) {
          return;
        }

        const tr = document.createElement('tr');
        
        row.c.forEach((cell, indexColumna) => {
          const td = document.createElement('td');
          let valor = cell ? (cell.v !== null ? String(cell.v) : '') : '';

          // COLUMNA B (Índice 1): FORMATEO DE FECHA
          if (indexColumna === 1) {
            valor = cell && cell.f ? cell.f : formatearFecha(valor);
            td.textContent = valor;

          // COLUMNA C (Índice 2): ESTADOS CON COLORES
          } else if (indexColumna === 2) {
            const spanStatus = document.createElement('span');
            spanStatus.classList.add('badge-status');
            
            const valorLimpio = valor.trim().toLowerCase();

            if (valorLimpio === 'leído' || valorLimpio === 'leido') {
              spanStatus.classList.add('estado-leido');
            } else if (valorLimpio === 'en ejecución' || valorLimpio === 'en ejecucion') {
              spanStatus.classList.add('estado-en-ejecucion');
            } else if (valorLimpio === 'finalizado') {
              spanStatus.classList.add('estado-finalizado');
            } else if (valorLimpio === 'descartado') {
              spanStatus.classList.add('estado-descartado');
            }

            spanStatus.textContent = valor || '-';
            td.appendChild(spanStatus);

          // COLUMNA G (Índice 6): "LEER MÁS" PERSISTENTE Y SALTOS DE LÍNEA
          } else if (indexColumna === 6) {
            const contenedorTexto = document.createElement('div');
            
            if (valor.length > 45) {
              const estaExpandido = (filaExpandidaIndex === indexFila);
              
              if (estaExpandido) {
                contenedorTexto.classList.add('texto-completo');
              } else {
                contenedorTexto.classList.add('texto-recortado');
              }
              contenedorTexto.textContent = valor;

              const btnLeerMas = document.createElement('span');
              btnLeerMas.classList.add('btn-leer-mas');
              btnLeerMas.textContent = estaExpandido ? 'Leer menos' : 'Leer más';

              btnLeerMas.onclick = function() {
                if (filaExpandidaIndex === indexFila) {
                  filaExpandidaIndex = null; // Cierra si se hace clic en el mismo
                } else {
                  filaExpandidaIndex = indexFila; // Expande este y cierra los demás
                }
                renderizarTablaGViz(datosGlobales);
              };

              td.appendChild(contenedorTexto);
              td.appendChild(btnLeerMas);
            } else {
              contenedorTexto.classList.add('texto-completo');
              contenedorTexto.textContent = valor;
              td.appendChild(contenedorTexto);
            }

          // RESTO DE COLUMNAS
          } else {
            td.textContent = valor;
          }

          tr.appendChild(td);
        });

        cuerpoTabla.appendChild(tr);
      });
    }

    function filtrarPorUsuario() {
      if (datosGlobales) {
        renderizarTablaGViz(datosGlobales);
      }
    }

    // GRÁFICO CON COLORES NÍTIDOS Y PORCENTAJES VISIBLES
    function renderizarGraficoTorta(tablaData) {
      if (!google.visualization) return;

      const conteoEstados = {
        'Leído': 0,
        'En ejecución': 0,
        'Finalizado': 0,
        'Descartado': 0
      };

      tablaData.rows.forEach(row => {
        if (row.c && row.c[2] && row.c[2].v) {
          const val = String(row.c[2].v).trim().toLowerCase();
          if (val === 'leído' || val === 'leido') conteoEstados['Leído']++;
          else if (val === 'en ejecución' || val === 'en ejecucion') conteoEstados['En ejecución']++;
          else if (val === 'finalizado') conteoEstados['Finalizado']++;
          else if (val === 'descartado') conteoEstados['Descartado']++;
        }
      });

      const dataArray = [
        ['Estado', 'Cantidad'],
        ['Leído', conteoEstados['Leído']],
        ['En ejecución', conteoEstados['En ejecución']],
        ['Finalizado', conteoEstados['Finalizado']],
        ['Descartado', conteoEstados['Descartado']]
      ];

      const data = google.visualization.arrayToDataTable(dataArray);

      // Colores sólidos para mayor visibilidad y legibilidad del porcentaje
      const options = {
        title: 'Distribución por Estado',
        pieHole: 0.35,
        colors: ['#fbc02d', '#f57c00', '#388e3c', '#d32f2f'], // Amarillo, Naranja, Verde, Rojo vívidos
        chartArea: { width: '85%', height: '80%' },
        legend: { position: 'right', alignment: 'center' },
        pieSliceTextStyle: {
          color: '#ffffff',
          fontSize: 13,
          bold: true
        }
      };

      const chart = new google.visualization.PieChart(document.getElementById('chart-container'));
      chart.draw(data, options);
    }

    // Inicialización y sincronización en segundo plano cada 5 segundos
    google.charts.setOnLoadCallback(() => {
      cargarSugerencias();
      setInterval(cargarSugerencias, 5000);
    });
  </script>
</body>
</html>
